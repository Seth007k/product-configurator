version: "3.8"

services:

  mongo:
    image: mongo:7
    container_name: product-config-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  
  backend:
    build: ./backend
    container_name: product-config-backend
    ports: 
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/products
    depends_on:
      - mongo
    restart: unless-stopped
  
  frontend:
    build: ./frontend
    container_name: product-config-frontend
    ports: 
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000

volumes:
  mongo-data: