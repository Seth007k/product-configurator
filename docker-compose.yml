version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: product-config-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product-config-backend
    restart: always
    ports: 
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/product-configurator
    depends_on:
      - mongo

volumes:
  mongo-data: